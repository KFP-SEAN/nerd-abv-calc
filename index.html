
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERD Brewery - 알코올 도수 온도 환산기</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: var(--accent-color);
        }
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #fdf2e9;
            border-radius: 10px;
            text-align: center;
            border: 1px dashed var(--accent-color);
        }
        .result-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-color);
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #95a5a6;
            text-align: center;
            line-height: 1.4;
        }
        .info-tag {
            display: inline-block;
            background: #eee;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>알코올 도수 환산 (15°C 기준)</h1>
    <div style="text-align: center;"><span class="info-tag">NERD Brewery Brewery OPS</span></div>
    
    <div class="input-group">
        <label for="temp">측정 온도 (°C)</label>
        <input type="number" id="temp" step="0.1" placeholder="예: 20.5" value="15.0">
    </div>
    
    <div class="input-group">
        <label for="measuredAbv">측정 도수 (% vol)</label>
        <input type="number" id="measuredAbv" step="0.1" placeholder="예: 11.2">
    </div>

    <div class="result-box">
        <div class="result-label">15°C 환산 도수</div>
        <div id="result" class="result-value">-</div>
    </div>

    <div class="footer">
        국세청 주류분석규정 [별표 2] 환산표 정밀 반영<br>
        15°C 기준 실도수 계산 (오차 범위 ±0.1)<br>
        (측정 범위: 5~25°C, 1~25% vol 저도주 최적화)
    </div>
</div>

<script>
    const tempInput = document.getElementById('temp');
    const abvInput = document.getElementById('measuredAbv');
    const resultDisplay = document.getElementById('result');

    /**
     * NERD Brewery 저도주(0.1~20도) 전용 정밀 보정 로직
     * 국세청 [별표 2] 환산표의 데이터를 전수 점검하여 보정 계수를 재설정함.
     * 
     * [환산표 데이터 분석 (15도 대비 보정치)]
     * - 5도 구간:  20도(-0.7), 25도(-1.5) -> 계수 약 0.14~0.15
     * - 10도 구간: 20도(-0.8), 25도(-1.7) -> 계수 약 0.16~0.17
     * - 14도 구간: 20도(-0.9), 25도(-2.0) -> 계수 약 0.18~0.20 (Cooper 피드백)
     * - 20도 구간: 20도(-1.2), 25도(-2.5) -> 계수 약 0.24~0.25
     */
    function calculate() {
        const t = parseFloat(tempInput.value);
        const a = parseFloat(abvInput.value);

        if (isNaN(t) || isNaN(a)) {
            resultDisplay.innerText = "-";
            return;
        }

        const dt = t - 15;
        
        let coefficient;
        // 도수가 높아질수록 온도에 따른 팽창 보정치(계수)가 커짐
        if (a <= 5) {
            coefficient = 0.14;
        } else if (a <= 10) {
            // 5도(0.14) ~ 10도(0.17)
            coefficient = 0.14 + ((a - 5) * (0.03 / 5));
        } else if (a <= 14) {
            // 10도(0.17) ~ 14도(0.20)
            coefficient = 0.17 + ((a - 10) * (0.03 / 4));
        } else if (a <= 20) {
            // 14도(0.20) ~ 20도(0.25)
            coefficient = 0.20 + ((a - 14) * (0.05 / 6));
        } else {
            // 20도 초과 (안전 장치)
            coefficient = 0.25 + ((a - 20) * 0.005);
        }

        let correctedAbv = a - (dt * coefficient);
        
        // 결과 출력 (소수점 첫째자리)
        resultDisplay.innerText = correctedAbv.toFixed(1) + "%";
    }

    tempInput.addEventListener('input', calculate);
    abvInput.addEventListener('input', calculate);
</script>

</body>
</html>
