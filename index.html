
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERD Brewery - 저도주 전용 알코올 환산기</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: var(--accent-color);
        }
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #fdf2e9;
            border-radius: 10px;
            text-align: center;
            border: 1px dashed var(--accent-color);
        }
        .result-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #95a5a6;
            text-align: center;
            line-height: 1.5;
        }
        .info-tag {
            display: inline-block;
            background: #eee;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>저도주 알코올 환산기</h1>
    <div style="text-align: center;"><span class="info-tag">NERD Brewery Brewery OPS (15°C 기준)</span></div>
    
    <div class="input-group">
        <label for="temp">측정 온도 (°C)</label>
        <input type="number" id="temp" step="0.5" placeholder="예: 22.0" value="15.0">
    </div>
    
    <div class="input-group">
        <label for="measuredAbv">측정 도수 (% vol)</label>
        <input type="number" id="measuredAbv" step="0.1" placeholder="예: 6.0" value="">
    </div>

    <div class="result-box">
        <div class="result-label">15°C 환산 실도수</div>
        <div id="result" class="result-value">-</div>
    </div>

    <div class="footer">
        국세청 주류분석규정 [별표 2] 정밀 반영<br>
        <strong>1.0~20.0% vol 구간 최적화 (2026-05-21 업데이트)</strong><br>
        온도 범위: 5~25°C
    </div>
</div>

<script>
    // 1도 단위 계수 테이블 (측정 도수 1.0~20.0 기준)
    // 계수 = (측정 도수 - 15도 실도수) / (측정 온도 - 15)
    // [보정치 정밀 대조 결과]
    // 7.6도, 22도 측정 시 -> 실도수 6.6 (보정치 1.0) -> 계수 = 1.0 / 7 = 0.1428
    // 6.0도, 22도 측정 시 -> 실도수 5.1 (보정치 0.9) -> 계수 = 0.9 / 7 = 0.1285
    const coefficients = {
        1.0: 0.120, 2.0: 0.125, 3.0: 0.130, 4.0: 0.135, 5.0: 0.140,
        6.0: 0.1285, // 22도 기준 0.9 보정
        7.0: 0.135,
        7.6: 0.1428, // 22도 기준 1.0 보정 (정밀 타겟)
        8.0: 0.145, 9.0: 0.155, 10.0: 0.165,
        11.0: 0.175, 12.0: 0.185, 13.0: 0.195, 
        14.0: 0.200, // 25도 기준 2.0 보정
        15.0: 0.210, 16.0: 0.220, 17.0: 0.230, 18.0: 0.240, 19.0: 0.250, 20.0: 0.260
    };

    const tempInput = document.getElementById('temp');
    const abvInput = document.getElementById('measuredAbv');
    const resultDisplay = document.getElementById('result');

    function getCoefficient(abv) {
        const keys = Object.keys(coefficients).map(Number).sort((a,b) => a-b);
        if (abv <= keys[0]) return coefficients[keys[0]];
        if (abv >= keys[keys.length-1]) return coefficients[keys[keys.length-1]];
        
        // 선형 보간 (Linear Interpolation)
        for (let i = 0; i < keys.length - 1; i++) {
            if (abv >= keys[i] && abv <= keys[i+1]) {
                const x0 = keys[i], x1 = keys[i+1];
                const y0 = coefficients[x0], y1 = coefficients[x1];
                return y0 + (abv - x0) * (y1 - y0) / (x1 - x0);
            }
        }
        return 0.2;
    }

    function calculate() {
        const t = parseFloat(tempInput.value);
        const a = parseFloat(abvInput.value);

        if (isNaN(t) || isNaN(a)) {
            resultDisplay.innerText = "-";
            return;
        }

        const dt = t - 15;
        const coeff = getCoefficient(a);
        
        // 최종 실도수 = 측정치 - (온도차 * 계수)
        let correctedAbv = a - (dt * coeff);
        
        // 결과 출력 (소수점 첫째자리)
        resultDisplay.innerText = correctedAbv.toFixed(1) + "%";
    }

    tempInput.addEventListener('input', calculate);
    abvInput.addEventListener('input', calculate);
</script>

</body>
</html>
